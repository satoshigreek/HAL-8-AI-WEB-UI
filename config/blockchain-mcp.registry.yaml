# Blockchain MCP Registry
#
# Canonical inventory of first-party blockchain MCP integrations for this
# repository's Claude Code harness (.mcp.json), plus explicit "unsupported"
# records for chains in the approved scope that have no first-party MCP.
#
# Policy: only MCP servers published or operated by a chain's official
# foundation, protocol organization, core development company, or official
# GitHub organization may be enabled. Community, multi-chain, generic-EVM,
# RPC-provider, wallet-company and exchange MCPs are prohibited.
# See config/blockchain-tool-policy.yaml and docs/blockchain-mcp-security.md.
#
# manifest_hash = sha256 over the sorted tool list (name, description,
# inputSchema) canonicalized with sorted keys and compact separators.
# It is written and drift-checked by scripts/blockchain-mcp-healthcheck.

version: 1
approved_scope:
  - bitcoin
  - ethereum
  - bnb-chain
  - xrpl
  - solana
  - tron
  - hyperliquid
  - dogecoin
  - zcash
  - stellar
  - base
  - ton
  - near
policy_ref: config/blockchain-tool-policy.yaml

