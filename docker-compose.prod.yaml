services:
  hal8:
    image: ghcr.io/satoshigreek/hal-8-ai-web-ui:main
    build: .
    restart: unless-stopped
    environment:
      # Required — sign sessions; generate once with: openssl rand -hex 32
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?set WEBUI_SECRET_KEY in .env}
      # Public origin, used for links in emails/notifications and opensearch
      - WEBUI_URL=https://${HAL8_DOMAIN:-chat.hal8.ai}
      # New signups default to the 'pending' role and need admin approval,
      # which keeps the deployment within the upstream license's 50-user cap.
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}
    volumes:
      - hal8-data:/app/backend/data
      # styling override layer — edit deploy/custom.css and re-run `up -d`,
      # no image rebuild needed
      - ./deploy/custom.css:/app/backend/open_webui/static/custom.css:ro
    expose:
      - "8080"

  # Apex Fusion Vector MCP server — 18+ chain tools for AI agents.
  # Built from the official repo; internal-only (no published ports).
  # Wallet mnemonics are passed per-call by the client, never stored here,
  # so with no wallet configured the server is effectively read-only.
  apex-mcp:
    build: https://github.com/Apex-Fusion/mcp-server.git
    restart: unless-stopped
    environment:
      # Vector MAINNET endpoints (defaults in the repo point to testnet)
      - VECTOR_OGMIOS_URL=https://ogmios.vector.mainnet.apexfusion.org
      - VECTOR_KOIOS_URL=https://koios.vector.apexfusion.org/
      - VECTOR_SUBMIT_URL=https://submit.vector.mainnet.apexfusion.org/api/submit/tx
      - VECTOR_EXPLORER_URL=https://explorer.vector.mainnet.apexfusion.org
      # Conservative safety limits (lovelace): 10 AP3X per tx, 50 AP3X daily
      - VECTOR_SPEND_LIMIT_PER_TX=10000000
      - VECTOR_SPEND_LIMIT_DAILY=50000000
      - VECTOR_AUDIT_LOG_PATH=/data/vector-audit-log.json
    volumes:
      - apex-mcp-data:/data
    expose:
      - "3000"

  # mcpo — Open WebUI's MCP-to-OpenAPI adapter. Bridges the Apex MCP
  # server's SSE transport to a plain OpenAPI tool server that HAL 8
  # consumes natively (registered as http://apex-tools:8000).
  apex-tools:
    image: ghcr.io/open-webui/mcpo:main
    restart: unless-stopped
    command: --port 8000 --server-type "sse" -- http://apex-mcp:3000/sse
    depends_on:
      - apex-mcp
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      - HAL8_DOMAIN=${HAL8_DOMAIN:-chat.hal8.ai}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - hal8

volumes:
  hal8-data:
  apex-mcp-data:
  caddy-data:
  caddy-config:
